services:
  app:
    build: .
    container_name: laravel_simple
    volumes:
      - .:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: venetian_cms
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"